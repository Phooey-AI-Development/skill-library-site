name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Triggered by the skills repo when a SKILL.md changes
  repository_dispatch:
    types: [skills-updated]
  # Safety-net daily rebuild in case a webhook is missed
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node 24 for the action-runner internals (not our build's Node version).
# Silences the Node-20 deprecation warning ahead of GitHub's June 2026 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo with submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # If the skills repo becomes private later, swap this for a PAT:
          # token: ${{ secrets.SKILLS_REPO_PAT }}

      - name: Update submodule to latest main
        run: |
          cd skills-content
          git fetch origin main
          git checkout origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
